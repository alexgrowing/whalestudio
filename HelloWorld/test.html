<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="400" height="550">
  <defs>
    <style>
      .fan-body { fill: #e0e0e0; stroke: #b0b0b0; stroke-width: 2; }
      .fan-base { fill: #d0d0d0; stroke: #b0b0b0; stroke-width: 2; }
      .fan-blades { fill: #a0cfff; opacity: 0.8; }
      .fan-grill { fill: none; stroke: #c0c0c0; stroke-width: 1.5; }
      .fan-knob { fill: #f0f0f0; stroke: #a0a0a0; stroke-width: 1; }
    </style>
    <path id="single-blade" d="M0,0 Q30,-60 10,-130 Q-10,-140 -30,-130 Q-50,-60 0,0 Z" />
  </defs>

  <g id="stand">
    <ellipse class="fan-base" cx="200" cy="500" rx="120" ry="30" />
    <rect class="fan-body" x="180" y="280" width="40" height="200" rx="5" ry="5" />
    <circle class="fan-knob" cx="160" cy="505" r="8" />
    <circle class="fan-knob" cx="200" cy="505" r="10" />
    <circle class="fan-knob" cx="240" cy="505" r="8" />
  </g>

  <g id="head-rear">
     <circle class="fan-body" cx="200" cy="280" r="25" />
    <circle class="fan-body" cx="200" cy="200" r="60" />
  </g>

  <g id="blades" transform="translate(200, 200)">
    <use href="#single-blade" class="fan-blades" transform="rotate(0)"/>
    <use href="#single-blade" class="fan-blades" transform="rotate(120)"/>
    <use href="#single-blade" class="fan-blades" transform="rotate(240)"/>
    <circle fill="#ffffff" stroke="#b0b0b0" stroke-width="2" cx="0" cy="0" r="20" />
  </g>

  <g id="grill" class="fan-grill" transform="translate(200, 200)">
    <circle r="160" stroke="#a0a0a0" stroke-width="4" />
    <circle r="130" />
    <circle r="100" />
    <circle r="70" />
    <circle r="40" />
    
    <g stroke="#c0c0c0" stroke-width="1.5">
        <line x1="0" y1="-40" x2="0" y2="-160" />
        <line x1="0" y1="40" x2="0" y2="160" />
        <line x1="-40" y1="0" x2="-160" y2="0" />
        <line x1="40" y1="0" x2="160" y2="0" />
        <line x1="28" y1="-28" x2="113" y2="-113" />
        <line x1="-28" y1="-28" x2="-113" y2="-113" />
        <line x1="28" y1="28" x2="113" y2="113" />
        <line x1="-28" y1="28" x2="-113" y2="113" />
    </g>
  </g>
</svg>
